    <script>

        function cargar() {

            const xhttp = new XMLHttpRequest();

            xhttp.onload = function () {

                const xmlDoc = xhttp.responseXML;

                let tabla = document.getElementById("tabla");

                tabla.innerHTML = `

                        <td>Nombre</td>

                    </tr>

                        <td>123</td>
                    </tr>

                    <tr>

                    </tr>
                `;

            };

        }

    </script>
